<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ablaze Luxe — Admin Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; padding:0; height:100vh; display:flex; align-items:center; justify-content:center; background:#12100E; font-family:'Montserrat',sans-serif; color:white;}
        .login-card { background:rgba(255,255,255,0.05); padding:3rem; border-radius:20px; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); width:100%; max-width:400px; text-align:center;}
        h1 { margin-bottom:2rem; font-weight:300; letter-spacing:4px;}
        input { width:100%; padding:1rem; margin-bottom:1.5rem; background:rgba(255,255,255,0.1); border:none; border-radius:10px; color:white; outline:none; text-align:center;}
        button { width:100%; padding:1rem; border:none; border-radius:10px; background:#C19A6B; color:white; font-weight:700; cursor:pointer;}
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SECURE ACCESS</h1>
        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="Passphrase" required>
            <button type="submit">Unlock Dashboard</button>
        </form>
    </div>
</body>
</html>
